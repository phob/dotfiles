##### Prefix key #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix
##### Window/pane numbering #####
# Makes window switching natural: C-a 1, C-a 2, ...
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
##### Terminal + color #####
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
##### Quality-of-life #####
set -g mouse off
set -g history-limit 100000
set -g focus-events on
setw -g mode-keys vi
set -sg escape-time 10
set -g repeat-time 600
set -g set-clipboard on
# Ensure shell environment is preserved
set-option -g default-shell /usr/sbin/fish
set-option -g default-command /usr/sbin/fish
##### Better splits (keep cwd) #####
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
##### Easy pane movement #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
##### Fast reload #####
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
##### Status bar basics #####
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#S"
set -g status-right "%Y-%m-%d %H:%M"
# TPM + restore plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Auto-save every 10 minutes + auto-restore on tmux start
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'
# TPM bootstrap (must be last)
run '~/.tmux/plugins/tpm/tpm'
